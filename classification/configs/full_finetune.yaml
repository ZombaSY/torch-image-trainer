# Full fine-tuning: backbone + head trained, with a smaller backbone LR.
data:
  root: /data/seo_sunyong/workspace/data/cocone/UI/P1/style-classifier-dataset
  train_csv: train.csv
  val_csv: val.csv
  image_column: input
  label_column: class
  num_classes: 3
  class_names: [chic, feminine, lovely]
  pad_to_square: true
  pad_value: 255
  to_rgb: true

aug:
  horizontal_flip: true
  horizontal_flip_p: 0.5
  coarse_dropout: true
  coarse_dropout_p: 0.5
  coarse_dropout_max_holes: 8
  coarse_dropout_max_height_frac: 0.15
  coarse_dropout_max_width_frac: 0.15
  blur: true
  blur_p: 0.2
  blur_limit: 5
  rotate: true
  rotate_p: 0.5
  rotate_limit: 20
  mixup: true
  mixup_alpha: 0.2
  cutmix: true
  cutmix_alpha: 1.0
  mix_p: 0.5
  mix_switch_prob: 0.5
  mix_min_ratio: 0.3

model:
  backbone: wd-swinv2-tagger-v3   # wd-swinv2-tagger-v3 | wd-vit-large-tagger-v3 | wd-vit-tagger-v3
  pretrained: true
  head_dropout: 0.1
  image_size: null

optim:
  epochs: 500                  # hard cap; early stopping usually ends sooner
  batch_size: 16
  num_workers: 8
  optimizer: adamw
  lr: 5.0e-4                    # head LR
  backbone_lr: 1.0e-5          # lower LR for pretrained backbone
  weight_decay: 1.0e-4
  scheduler: cosine
  warmup_epochs: 10
  min_lr: 1.0e-6
  label_smoothing: 0.1
  class_weighted_loss: true
  weighted_sampler: false
  amp: true
  grad_clip_norm: 1.0

run:
  mode: full_finetune
  seed: 42
  deterministic: true
  device: cuda
  output_dir: runs/full_finetune_vit
  monitor: macro_f1
  early_stop_patience: 200      # stop if no new best for 50 epochs (0 disables)
  save_last: true
  log_interval: 10
