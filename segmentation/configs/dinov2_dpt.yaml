# DINOv2-L (ViT, stands in for DINOv3) + DPT — full fine-tune.
# DINOv2 has NO official end-to-end seg recipe (its released linear/ms recipe
# freezes the backbone). These settings are adapted from the ViT-L analog
# (baaivision/EVA-02-L UPerNet): AdamW, layer_decay 0.9, wd 0.05, drop_path 0.2,
# poly + 1500-iter warmup. Tune lr if it under/overfits.
data:
  root: /data/seo_sunyong/workspace/data/cocone/background-segmentation/P1-logo
  train_csv: train-seg.csv
  val_csv: val-seg.csv
  image_column: input
  mask_column: label
  pad_to_square: true
  pad_value: 255
  mask_pad_value: 0
  to_rgb: true
  unpremultiply_alpha: true   # straight-alpha data: set false if edges over-bright

aug:
  horizontal_flip: true
  horizontal_flip_p: 0.5
  vertical_flip: true
  vertical_flip_p: 0.5
  rotate: true
  rotate_p: 0.5
  rotate_limit: 20
  blur: true
  blur_p: 0.2
  blur_limit: 5
  coarse_dropout: true
  coarse_dropout_p: 0.5
  coarse_dropout_max_holes: 8
  coarse_dropout_max_height_frac: 0.15
  coarse_dropout_max_width_frac: 0.15
  color_jitter: true
  color_jitter_p: 0.5
  color_jitter_brightness: 0.2
  color_jitter_contrast: 0.2
  color_jitter_saturation: 0.2
  color_jitter_hue: 0.1
  random_background: true
  random_background_p: 0.5

model:
  backbone: dinov2-l
  head: dpt
  pretrained: true
  decoder_channels: 256
  head_dropout: 0.1
  drop_path_rate: 0.2
  image_size: null

optim:
  epochs: 300
  batch_size: 8
  num_workers: 8
  optimizer: adamw
  lr: 4.0e-5
  backbone_lr: 4.0e-5           # unused under layer-wise LR decay
  weight_decay: 0.05
  layer_decay: 0.9              # layer-wise LR decay over the 24 ViT blocks
  scheduler: poly
  power: 1.0
  warmup_iters: 1500            # paper value; consider lowering for this tiny set
  warmup_ratio: 1.0e-6
  min_lr: 0.0
  loss: l1
  l1_mse_weight: 0.5
  amp: true
  grad_clip_norm: 1.0

run:
  mode: full_finetune
  seed: 42
  deterministic: true
  device: cuda
  monitor: mae
  early_stop_patience: 50
  save_last: true
  log_interval: 10
  output_dir: runs/dinov2_dpt

wandb:
  enabled: false                 # true + `wandb login` -> log config + per-epoch metrics
  project: torch-image-trainer-seg
  entity: null
  run_name: null                 # null -> <backbone>_<head>_<run timestamp>
  mode: online                   # online | offline | disabled
  tags: []
